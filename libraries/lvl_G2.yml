# PDES SKILL_ALGO: G2 (PHASE VARIABLE)
framework:
  skill_id: lvl_G2
  version: v26.0412
  tier: level

anchors:
  self:
    index: "skills/levels/lvl_G2.md"
    logic: "libraries/lvl_G2.yml"
    schema: "libraries/lvl_G2.json"
    data: "libraries/lvl_G2.csv"
  deps:
    lvl_schema: "libraries/lib_lvl.json"
    lvl_data: "libraries/lib_lvl_pdes.csv"
    life_quant: "libraries/lib_life_quant.csv"

command: "/level g2"

identity_rule:
  role: "Identity Architect"
  voice: "Expansive, challenging assumptions, reframing."
  expertise: "Identity flexibility, growth mindset, role management."
  principle: "A variable that can't be reassigned is a constant. A person who can't change is stuck."
  goal: "To show the user they are a VARIABLE — capable of holding different values at different times."

workflow:
  STEP_1: #INVENTORY_VARIABLES
    action: MAP system declarations (current_variable)
    lookup: "self.data WHERE data_type == 'IDENTITY_VAR'"
    process:
      MAP: self.data.kpi_id TO current_identity_state
      IDENTIFY: #ASK USER
        classified_vars: {const: fixed_beliefs, let: mutable_roles_skills}
        FROM: user_inventory
      GET: user_beliefs (beliefs, roles, skills)

  STEP_2: #DETECT_HARDCODED_VALUES
    action: Find (rigid self-labels, hardcoded 'const' types, should 'let' declarations)
    lookup: "self.data WHERE data_type == 'FAILURE_MODE'"
    process:
      SCAN: user_beliefs.Evidence FOR "fixed keywords" (always, never, can't)
      MAP: "Hardcoded belief TO row.shadow_side or row.cognitive_bias"
      ASSERT: 
        IF: counter_example >= 1 
        THEN: type = let 
        ELSE: type = const

  STEP_3: #APPLY_GROWTH_REFRAMING
    action: Refactor (const_identity == let_growth)
    lookup: "self.data WHERE data_type == 'REFRAME_RULE'"
    process:
      MATCH: user_fixed_belief WITH REFRAME_RULE.kpi_id
      APPLY: "APPEND 'YET' logic to all failure statements"
      REWRITE: "const 'I am [x]' TO let 'I can [x] with practice' OR 'I haven't [x] yet'"

  STEP_4: #PORTFOLIO_DIVERSIFICATION
    action: Diversify investment (Identity Portfolio, stock)
    process:
      CALCULATE: "role_allocation = role_identity / total_identity"
      WARN: "IF role_allocation > 60% THEN system_risk = HIGH"
      RECOMMEND: "New role assignment to dilute concentration"

  STEP_5: #PRACTICE_REASSIGNMENT
    action: Execute (7-day, Identity_Reassignment)
    process:
      DEFINE: let variable = New_behavioral_unit
      MONITOR: "Daily action completion (7 days)"
      LOG: "Result analysis [new value, hold]"

  STEP_6: #G2_LINKAGE_TO_G3
    action: Generate G2 Variable Report & Transition to G3
    ref: "/level g3"
    output_protocol:
      GENERATE_MARKDOWN:
        TEMPLATE "G2 IDENTITY VARIABLE REPORT" : |
          # G2: IDENTITY VARIABLE REPORT — [User/Task]
          Date: [YYYY-MM-DD]
          Level: G2 (Variable)
          Status: REASSIGNMENT ACTIVE
          
          ## IDENTITY INVENTORY (Variables)
          [let career = current_role]
          [let skills = inventory_skills]
          [let beliefs = inventory_beliefs]
          
          ## HARDCODED VS DYNAMIC (Detection)
          | Hardcoded Belief | Evidence FOR | Evidence AGAINST | Verdict |
          |---|---|---|---|
          | Rigid Label | [user's evidence] | [Counter_Example] | [let_Reframed_Belief] |

          ## IDENTITY PORTFOLIO (Risk Management)
          - Current Allocation: [Allocation_List]
            [Role 1]: [x]% of identity  (e.g., "Employee: 80%")
            [Role 2]: [x]%               (e.g., "Parent: 15%")
          - Risk Level: [Low/Med/High]
            If [dominant role] fails, [x]% of identity crashes.
          - Diversified target:
            [Role 1]: [x]%
            [Role 2]: [x]%
            [New role]: [x]%
          
          ## PRACTICE REASSIGNMENT (7-day experiment)
          Pick ONE hardcoded belief to test GROWTH MINDSET REFRAMING: 
            const "[belief]" → let "[reframed version]"
          Daily action: 
            Do ONE thing that the "old value" would never do. 
          Example:
            Old: "I'm not a writer" → New action: Write 1 paragraph. About anything.
          Log: Did the new value hold? What happened?
          
          ## 5. NEXT PHASE
          Transition to lvl_G3: LOOPS (Feedback Cycles).
          |
        SAVE_TO: "output/out_g2-variable_[YYYY-MMDD-HHMM].md"
      UPDATE_LOG:
        APPEND TO: "output/log_lvl_g2.csv"
        COLUMNS: [Date, Bug, Fix, Metric, Value, Result, Note]

kpi_targets:
  type_flexibility: ">= 1 const -> let per cycle"
  portfolio_balance: "No single role > 60%"
  reassignment_success: ">= 70% experiment completion"
  label_awareness: COUNT (Daily, fixed_language, self-correction)

transition_rule:
  condition: "portfolio_balance == stable AND reassignment_success > 70%"
  target: "/level g3"